apiVersion: v1
kind: Pod
metadata:
  name: nginx-anti-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      # Hard Rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In 
            values:
            - us-east-1c
          - key: project
            operator: NotIn # --> For Anti Affinity & In --> For affinity
            values:
            - amazon
  containers:
  - name: nginx
    image: nginx
  tolerations:
  - key: "hardware"
    operator: "Equal"
    value: "gpu"
    effect: "NoExecute"